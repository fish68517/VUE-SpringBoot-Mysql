spring:
  application:
    name: admin-web-system
  datasource:
    url: jdbc:mysql://localhost:3306/admin_health?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置由logback-spring.xml管理
logging:
  config: classpath:logback-spring.xml

server:
  port: 8080
  servlet:
    context-path: /api

file:
  upload:
    path: ../image/
